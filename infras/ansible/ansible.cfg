[defaults]
inventory = inventory/aws_ec2.yml
host_key_checking = False
deprecation_warnings = False
remote_user = ec2-user

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o ProxyCommand="aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p"   