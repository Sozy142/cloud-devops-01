---
- name: Configure NAT instance
  hosts: jenkins_aws_nat_instance
  become: true
  vars:
    ansible_ssh_private_key_file: "~/.ssh/jenkins-poc-key.pem"
  roles:
    - nat

- name: Configure Jenkins Controller
  hosts: jenkins_aws_controller_instance
  become: true
  vars:
    ansible_ssh_private_key_file: "~/.ssh/jenkins-poc-key.pem"
  roles:
    - jenkins_controller